# ============================================
#  Lahar City Website — Application Properties
# ============================================

# Server port (change if 8080 is already in use)
server.port=8080

# Application name
spring.application.name=lahar-city-website

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# Logging
logging.level.root=INFO
logging.level.com.lahar=DEBUG
